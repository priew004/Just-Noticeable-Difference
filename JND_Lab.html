<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JND Perceptual Threshold Lab</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; padding: 20px; color: #eee; min-height: 100vh; margin: 0; user-select: none; }
        
        h2 { color: #222; letter-spacing: 4px; margin-bottom: 20px; font-size: 1.5rem; text-align: center; }

        .stage { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; align-items: center; margin-bottom: 40px; width: 100%; max-width: 900px; }
        
        .box-wrap { display: flex; flex-direction: column; align-items: center; }
        .box { width: 300px; height: 300px; border: 1px solid #333; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .label { margin-bottom: 10px; font-weight: bold; color: #555; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        .controls { 
            background: #1e1e1e; 
            padding: 25px; 
            border-radius: 15px; 
            width: 95%; 
            max-width: 700px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            border: 1px solid #252525; 
        }
        
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .arrow-container { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #252525; 
            padding: 5px 15px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            width: 100%; 
            box-sizing: border-box;
        }
        
        .arrow-btn { 
            font-size: 32px; 
            color: #444; 
            cursor: pointer; 
            transition: 0.2s;
            padding: 5px 15px;
        }
        .arrow-btn:hover { color: #00ffcc; transform: scale(1.1); }
        .arrow-btn:active { color: #fff; transform: scale(0.9); }

        .control-text { font-size: 10px; color: #666; text-transform: uppercase; font-weight: bold; pointer-events: none; }

        button { padding: 12px; font-size: 12px; cursor: pointer; border: none; border-radius: 4px; background: #333; color: #ccc; transition: 0.2s; text-transform: uppercase; }
        button:hover { background: #444; color: #fff; }
        .btn-active { background: #00796b; color: white; }
        
        .teacher-panel { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; margin-top: 10px; padding-top: 15px; }
        .delta-box { font-family: monospace; font-size: 16px; color: #00ffcc; opacity: 0; transition: opacity 0.3s; }
        .visible { opacity: 1 !important; }

        .creator-tag { position: fixed; bottom: 15px; right: 20px; font-size: 15px; color: rgba(255, 255, 255, 0.05); pointer-events: none; }

        /* Tablet/Mobile tweak */
        @media (max-width: 650px) {
            .box { width: 220px; height: 220px; }
            .controls { grid-template-columns: 1fr; }
            .teacher-panel { grid-column: span 1; flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <h2>PERCEPTUAL THRESHOLD TEST</h2>

    <div class="stage">
        <div id="ref-box-container" class="box-wrap" style="opacity: 0;">
            <div class="label">Reference</div>
            <div id="square-ref" class="box"></div>
        </div>
        <div class="box-wrap">
            <div class="label">Target</div>
            <div id="square-target" class="box"></div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <div class="arrow-container">
                <div class="arrow-btn" onclick="adjust('ref', -1)">«</div>
                <div class="control-text">Ref</div>
                <div class="arrow-btn" onclick="adjust('ref', 1)">»</div>
            </div>
        </div>

        <div class="control-group">
            <div class="arrow-container">
                <div class="arrow-btn" onclick="adjust('tar', -1)">«</div>
                <div class="control-text">Target</div>
                <div class="arrow-btn" onclick="adjust('tar', 1)">»</div>
            </div>
        </div>

        <button onclick="toggleReference()" id="btn-ref">Reveal Reference</button>
        <button onclick="matchTarget()">Match Target</button>
        <button onclick="changeHue()" style="grid-column: span 2;">Change Color</button>

        <div class="teacher-panel">
            <button onclick="toggleData()" style="font-size: 10px;">Intensity Values HUD</button>
            <div id="delta-display" class="delta-box">
                R: <span id="r-val">70</span>% | T: <span id="t-val">0</span>% | &Delta;: <span id="d-val">70</span>%
            </div>
        </div>
    </div>

    <div class="creator-tag">Created by Jett Priewe</div>

    <script>
        let hue = 160; 
        let refVal = 70;
        let tarVal = 0;

        const sRef = document.getElementById('square-ref');
        const sTar = document.getElementById('square-target');
        const rText = document.getElementById('r-val');
        const tText = document.getElementById('t-val');
        const dText = document.getElementById('d-val');

        function adjust(type, amt) {
            let step = 2; 
            if (type === 'ref') {
                refVal = Math.min(100, Math.max(0, refVal + (amt * step)));
            } else {
                tarVal = Math.min(100, Math.max(0, tarVal + (amt * step)));
            }
            update();
        }

        function update() {
            sRef.style.backgroundColor = `hsl(${hue}, ${refVal}%, 50%)`;
            sTar.style.backgroundColor = `hsl(${hue}, ${tarVal}%, 50%)`;
            rText.innerText = refVal;
            tText.innerText = tarVal;
            dText.innerText = Math.abs(refVal - tarVal);
        }

        function toggleReference() {
            const cont = document.getElementById('ref-box-container');
            cont.style.opacity = (cont.style.opacity == "0") ? "1" : "0";
            document.getElementById('btn-ref').classList.toggle('btn-active');
        }

        function matchTarget() {
            tarVal = refVal;
            update();
        }

        function toggleData() {
            document.getElementById('delta-display').classList.toggle('visible');
        }

        function changeHue() {
            hue = Math.floor(Math.random() * 360);
            update();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'ArrowRight') adjust('tar', 1);
            if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') adjust('tar', -1);
            if (e.key.toLowerCase() === 'h') toggleData();
            if (e.code === 'Space') { e.preventDefault(); toggleReference(); }
        });

        update();
    </script>
</body>
</html>
