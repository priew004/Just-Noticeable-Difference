<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JND Demo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: #eee; min-height: 100vh; margin: 0; padding-top: 50px; overflow: hidden; }
        .stage { display: flex; gap: 60px; align-items: center; margin-bottom: 60px; }
        .box { width: 350px; height: 350px; border: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .label { margin-bottom: 15px; font-weight: bold; color: #444; text-transform: uppercase; letter-spacing: 2px; }
        
        /* The Sliders are now just invisible hit-zones at the bottom */
        .hit-zone { position: fixed; bottom: 0; width: 50%; height: 100px; opacity: 0; cursor: ew-resize; }
        #ref-zone { left: 0; }
        #tar-zone { right: 0; }

        .teacher-hud { position: fixed; top: 20px; font-family: monospace; font-size: 24px; color: #00ffcc; display: none; }
        .visible { display: block; }
    </style>
</head>
<body>

    <div id="hud" class="teacher-hud">
        REF: <span id="r-val">70</span>% | TAR: <span id="t-val">0</span>% | &Delta;: <span id="d-val">70</span>%
    </div>

    <div class="stage">
        <div id="ref-container" style="visibility: hidden;">
            <div class="label">Reference</div>
            <div id="square-ref" class="box"></div>
        </div>
        <div>
            <div class="label">Target</div>
            <div id="square-target" class="box"></div>
        </div>
    </div>

    <input type="range" id="refSlider" class="hit-zone" style="left:0" min="0" max="100" value="70">
    <input type="range" id="tarSlider" class="hit-zone" style="right:0" min="0" max="100" value="0">

    <script>
        let hue = 160;
        const sRef = document.getElementById('square-ref');
        const sTar = document.getElementById('square-target');
        const rS = document.getElementById('refSlider');
        const tS = document.getElementById('tarSlider');
        const hud = document.getElementById('hud');

        function update() {
            sRef.style.backgroundColor = `hsl(${hue}, ${rS.value}%, 50%)`;
            sTar.style.backgroundColor = `hsl(${hue}, ${tS.value}%, 50%)`;
            document.getElementById('r-val').innerText = rS.value;
            document.getElementById('t-val').innerText = tS.value;
            document.getElementById('d-val').innerText = Math.abs(rS.value - tS.value);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                const ref = document.getElementById('ref-container');
                ref.style.visibility = (ref.style.visibility === 'hidden') ? 'visible' : 'hidden';
            }
            if (e.key.toLowerCase() === 'h') hud.classList.toggle('visible');
            if (e.key.toLowerCase() === 'm') { tS.value = rS.value; update(); }
            if (e.key.toLowerCase() === 'c') { hue = Math.floor(Math.random() * 360); update(); }
            if (e.key === 'ArrowUp' || e.key === 'ArrowRight') { tS.value = parseInt(tS.value) + 1; update(); }
            if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') { tS.value = parseInt(tS.value) - 1; update(); }
        });

        rS.oninput = update; tS.oninput = update;
        update();
    </script>
</body>
</html>
